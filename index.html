<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Тропа к Королю</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a2e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>👑</text></svg>">
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: linear-gradient(180deg, #0d1a0d 0%, #142014 30%, #1a2e1a 100%);
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      color: #d4c8b8;
      min-height: 100vh;
      padding: 12px;
      max-width: 480px;
      margin: 0 auto;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      background-attachment: fixed;
    }

    .card {
      background: rgba(26, 38, 26, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 160, 100, 0.25);
      border-radius: 20px;
      padding: 16px;
      margin: 10px 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 1px 3px rgba(100,160,100,0.1);
      transition: all 0.2s ease;
    }

    h1 {
      text-align: center;
      font-size: 20px;
      color: #c8e6c8;
      margin: 4px 0;
      letter-spacing: 2px;
      font-weight: 700;
      text-shadow: 0 0 20px rgba(100,200,100,0.3);
    }

    .subtitle {
      text-align: center;
      font-size: 10px;
      color: #7a9a7a;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Герой */
    .hero-section {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hero-avatar {
      position: relative;
      width: 100px;
      height: 100px;
      flex-shrink: 0;
    }

    .hero-sprite {
      width: 100%;
      height: 100%;
      background: rgba(20, 30, 20, 0.8);
      border: 2px solid rgba(100, 160, 100, 0.4);
      border-radius: 50%;
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      grid-template-rows: repeat(10, 1fr);
      overflow: hidden;
      box-shadow: 0 0 30px rgba(100, 160, 100, 0.2);
    }

    .px {
      width: 100%;
      height: 100%;
      transition: all 0.4s ease;
    }

    .crown-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      font-size: 26px;
      filter: drop-shadow(0 0 8px rgba(255,215,0,0.7));
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .hero-info {
      flex: 1;
      min-width: 140px;
    }

    .title-badge {
      display: inline-block;
      background: linear-gradient(135deg, #4a8a4a, #2a5a2a);
      color: #c8e6c8;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .title-badge.king {
      background: linear-gradient(135deg, #ffd700, #aa8800);
      color: #1a1a00;
      box-shadow: 0 0 20px rgba(255,215,0,0.4);
    }

    .stat-mini {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 3px 0;
      font-size: 11px;
    }

    .stat-icon { width: 18px; text-align: center; flex-shrink: 0; }

    .bar-mini {
      flex: 1;
      height: 6px;
      background: rgba(0,0,0,0.4);
      border-radius: 10px;
      overflow: hidden;
    }

    .bar-fill-mini {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .bar-body { background: linear-gradient(90deg, #e06060, #ff9090); }
    .bar-mind { background: linear-gradient(90deg, #6090e0, #90b0ff); }
    .bar-soul { background: linear-gradient(90deg, #e0c040, #ffe080); }

    /* Советники */
    .advisors-row {
      display: flex;
      gap: 8px;
    }

    .advisor-card {
      flex: 1;
      text-align: center;
      background: rgba(20, 30, 20, 0.6);
      border-radius: 16px;
      padding: 10px 6px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
      position: relative;
    }

    .advisor-card:hover {
      border-color: rgba(100, 160, 100, 0.3);
      transform: translateY(-2px);
    }

    .advisor-card.active-advisor {
      border-color: #ffd700 !important;
      box-shadow: 0 0 15px rgba(255,215,0,0.2);
      background: rgba(30, 40, 20, 0.8);
    }

    .advisor-icon {
      font-size: 32px;
      margin-bottom: 2px;
      transition: transform 0.3s;
    }

    .advisor-card:hover .advisor-icon {
      transform: scale(1.1);
    }

    .advisor-name {
      font-size: 9px;
      color: #8aaa8a;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .advisor-level {
      font-size: 10px;
      color: #ffd700;
      font-weight: bold;
    }

    .advisor-mood {
      font-size: 16px;
      position: absolute;
      top: -4px;
      right: 4px;
    }

    .advisor-xp-bar {
      height: 3px;
      background: rgba(0,0,0,0.4);
      border-radius: 10px;
      margin-top: 4px;
      overflow: hidden;
    }

    .advisor-xp-fill {
      height: 100%;
      background: #ffd700;
      border-radius: 10px;
      transition: width 0.5s;
    }

    /* Квесты */
    .quest-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      margin: 6px 0;
      background: rgba(20, 30, 20, 0.5);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }

    .quest-card:active {
      transform: scale(0.98);
      background: rgba(30, 45, 30, 0.6);
    }

    .quest-card.done {
      opacity: 0.45;
      border-color: rgba(100, 160, 100, 0.2);
    }

    .quest-card.done .quest-name {
      text-decoration: line-through;
      color: #6a8a6a;
    }

    .quest-card.suggested {
      border-color: rgba(255, 215, 0, 0.3);
      background: rgba(30, 35, 20, 0.5);
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 5px rgba(255,215,0,0.1); }
      50% { box-shadow: 0 0 15px rgba(255,215,0,0.25); }
    }

    .quest-icon {
      font-size: 28px;
      width: 38px;
      text-align: center;
      flex-shrink: 0;
    }

    .quest-info { flex: 1; }
    .quest-name { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
    .quest-from { font-size: 9px; color: #8aaa8a; }
    .quest-reward { color: #ffd700; font-size: 10px; font-weight: 500; }
    .quest-suggested-badge {
      display: inline-block;
      background: #ffd700;
      color: #1a1a00;
      font-size: 8px;
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    /* Кнопки */
    .btn {
      background: rgba(40, 70, 40, 0.7);
      border: 1px solid rgba(100, 160, 100, 0.3);
      color: #c8e6c8;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 11px;
      cursor: pointer;
      border-radius: 14px;
      transition: all 0.2s;
      width: 100%;
      margin: 4px 0;
      font-size: 12px;
      text-transform: uppercase;
    }

    .btn:active {
      transform: scale(0.97);
      background: rgba(60, 100, 60, 0.5);
    }

    .btn.gold {
      background: rgba(60, 40, 10, 0.7);
      border-color: rgba(200, 150, 50, 0.4);
      color: #ffe8a0;
    }

    .btn.green {
      background: rgba(20, 60, 30, 0.7);
      border-color: rgba(80, 180, 100, 0.4);
      color: #b0ffc0;
    }

    .btn.small {
      width: auto;
      padding: 6px 14px;
      font-size: 10px;
      display: inline-block;
      border-radius: 10px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      background: rgba(10, 20, 10, 0.6);
      border: 1px solid rgba(100, 160, 100, 0.3);
      color: #d4c8b8;
      font-family: inherit;
      margin: 4px 0;
      font-size: 13px;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(150, 200, 150, 0.5);
    }

    textarea { resize: vertical; min-height: 50px; }

    .hidden { display: none !important; }

    .log-box {
      max-height: 100px;
      overflow-y: auto;
      font-size: 9px;
      line-height: 1.5;
      color: #7a9a7a;
    }

    /* Модальное окно */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .modal {
      background: linear-gradient(180deg, #1a2e1a, #142014);
      border: 1px solid rgba(100, 160, 100, 0.3);
      border-radius: 20px;
      padding: 20px;
      max-width: 380px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .modal h3 { 
      color: #c8e6c8; 
      margin-bottom: 10px; 
      text-align: center;
      font-size: 16px;
    }

    .modal h4 {
      color: #ffd700;
      margin: 10px 0 4px;
      font-size: 12px;
    }

    .player-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(100,160,100,0.1);
      font-size: 11px;
    }

    .player-row.me { color: #ffd700; font-weight: bold; }

    .chat-msg {
      padding: 4px 8px;
      margin: 2px 0;
      font-size: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      border-left: 2px solid #ffd700;
    }

    .chat-msg .author { color: #ffd700; font-weight: bold; }

    /* Аутентификация */
    .auth-screen { text-align: center; }
    .auth-screen h2 { font-size: 18px; margin-bottom: 12px; color: #c8e6c8; }
    .auth-screen .btn { margin: 5px 0; font-size: 13px; }

    .divider {
      display: flex;
      align-items: center;
      color: #5a7a5a;
      font-size: 9px;
      margin: 8px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(100,160,100,0.2);
    }

    .divider span { margin: 0 10px; }

    .error-msg {
      color: #ff8080;
      font-size: 10px;
      margin-top: 6px;
      min-height: 16px;
    }

    /* Табы */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      background: rgba(20,30,20,0.5);
      border: 1px solid rgba(100,160,100,0.2);
      text-align: center;
      cursor: pointer;
      font-size: 10px;
      letter-spacing: 1px;
      border-radius: 12px;
      transition: all 0.2s;
      color: #8aaa8a;
    }

    .tab.active {
      background: rgba(40,70,40,0.6);
      border-color: #ffd700;
      color: #ffd700;
      box-shadow: 0 0 12px rgba(255,215,0,0.15);
    }

    /* Плавные переходы */
    .fade-in {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <h1>👑 ТРОПА К КОРОЛЮ</h1>
  <p class="subtitle">Слушай советников · Прокачивай путь · Стань королём</p>

  <!-- Экран входа -->
  <div class="card auth-screen" id="authScreen">
    <h2>✨ Войти в королевство</h2>
    <input type="email" id="emailInput" placeholder="📧 Email">
    <input type="password" id="passInput" placeholder="🔒 Пароль">
    <button class="btn gold" onclick="loginEmail()">🔐 Войти</button>
    <button class="btn" onclick="registerEmail()">✨ Создать аккаунт</button>
    <div class="divider"><span>или</span></div>
    <button class="btn green" onclick="loginGoogle()">🔵 Google</button>
    <button class="btn" onclick="loginAnon()">👻 Быстрый вход</button>
    <p class="error-msg" id="authError"></p>
  </div>

  <!-- Основной интерфейс -->
  <div id="mainApp" class="hidden">
    
    <!-- Статус-бар -->
    <div class="card" style="text-align:center; font-size:9px; padding:6px;" id="authBox"></div>

    <!-- Герой + Советники -->
    <div class="card hero-section">
      <div class="hero-avatar">
        <div class="hero-sprite" id="heroSprite"></div>
        <div class="crown-badge" id="crownBadge"></div>
      </div>
      <div class="hero-info">
        <span class="title-badge" id="titleBadge">🌱 Путник</span>
        <div class="stat-mini"><span class="stat-icon">❤️</span><div class="bar-mini"><div class="bar-fill-mini bar-body" id="bodyBar" style="width:20%"></div></div><span style="font-size:9px;" id="bodyText">1 ур.</span></div>
        <div class="stat-mini"><span class="stat-icon">💙</span><div class="bar-mini"><div class="bar-fill-mini bar-mind" id="mindBar" style="width:20%"></div></div><span style="font-size:9px;" id="mindText">1 ур.</span></div>
        <div class="stat-mini"><span class="stat-icon">💛</span><div class="bar-mini"><div class="bar-fill-mini bar-soul" id="soulBar" style="width:20%"></div></div><span style="font-size:9px;" id="soulText">1 ур.</span></div>
      </div>
    </div>

    <!-- Три советника -->
    <div class="advisors-row" id="advisorsRow">
      <div class="advisor-card active-advisor" data-advisor="knight">
        <div class="advisor-mood" id="knightMood">😊</div>
        <div class="advisor-icon">🗡️</div>
        <div class="advisor-name">Рыцарь</div>
        <div class="advisor-level" id="knightLevel">Ур.1</div>
        <div class="advisor-xp-bar"><div class="advisor-xp-fill" id="knightXp" style="width:10%"></div></div>
      </div>
      <div class="advisor-card" data-advisor="maester">
        <div class="advisor-mood" id="maesterMood">😊</div>
        <div class="advisor-icon">📚</div>
        <div class="advisor-name">Мейстер</div>
        <div class="advisor-level" id="maesterLevel">Ур.1</div>
        <div class="advisor-xp-bar"><div class="advisor-xp-fill" id="maesterXp" style="width:10%"></div></div>
      </div>
      <div class="advisor-card" data-advisor="bard">
        <div class="advisor-mood" id="bardMood">😊</div>
        <div class="advisor-icon">🎨</div>
        <div class="advisor-name">Бард</div>
        <div class="advisor-level" id="bardLevel">Ур.1</div>
        <div class="advisor-xp-bar"><div class="advisor-xp-fill" id="bardXp" style="width:10%"></div></div>
      </div>
    </div>

    <!-- Вкладки -->
    <div class="tabs">
      <div class="tab active" data-tab="quests">⚔️ Квесты</div>
      <div class="tab" data-tab="challenges">👥 Челленджи</div>
      <div class="tab" data-tab="leaders">🌍 Лидеры</div>
    </div>

    <!-- Контент -->
    <div class="card fade-in" id="mainContent"></div>

    <!-- Модальное окно -->
    <div class="modal-overlay hidden" id="modal">
      <div class="modal" id="modalContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
